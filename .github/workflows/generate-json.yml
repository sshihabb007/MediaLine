name: Update Photo List
on:
  push:
    paths:
      - 'UPLOAD/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate JSON with Timestamps
        run: |
          echo "[" > photos.json
          # Get files, sort by git commit time (newest first)
          files_sshihabb007=$(git ls-files UPLOAD/ | xargs -I{} git log -1 --format="%at {}" {} | sort -nr | cut -d' ' -f2-)
          
          first_sshihabb007=true
          for file_sshihabb007 in $files_sshihabb007; do
            if [ "$first_sshihabb007" = true ]; then
              first_sshihabb007=false
            else
              echo "," >> photos.json
            fi
            # Get the Unix timestamp of the last commit for this file
            timestamp_sshihabb007=$(git log -1 --format=%ct "$file_sshihabb007")
            echo "  {\"url\": \"$file_sshihabb007\", \"timestamp\": $timestamp_sshihabb007}" >> photos.json
          done
          echo "]" >> photos.json

      - name: Commit and Push
        run: |
          git config --global user.name "Gallery Bot"
          git config --global user.email "actions@github.com"
          git add photos.json
          git commit -m "Auto-update gallery: $(date)" || exit 0
          git push
