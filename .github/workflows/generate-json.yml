name: Update Photo List
on:
  push:
    paths:
      - 'UPLOAD/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Thumbnails
        run: |
          mkdir -p UPLOAD/thumbs
          for file_sshihabb007 in UPLOAD/*; do
            if [ -f "$file_sshihabb007" ]; then
              filename_sshihabb007=$(basename "$file_sshihabb007")
              if [ "$filename_sshihabb007" != ".gitkeep" ]; then
                if [ ! -f "UPLOAD/thumbs/$filename_sshihabb007" ]; then
                  echo "Generating optimized thumb for $filename_sshihabb007"
                  convert "$file_sshihabb007" -thumbnail 250x -quality 60 -strip "UPLOAD/thumbs/$filename_sshihabb007" || true
                fi
              fi
            fi
          done

      - name: Generate JSON with Timestamps
        run: |
          echo "[" > photos.json
          # Get files, sort by git commit time
          files_sshihabb007=$(git ls-files UPLOAD/ | grep -v 'UPLOAD/thumbs/' | xargs -I{} git log -1 --format="%at {}" {} | sort -nr | cut -d' ' -f2-)
          
          first_sshihabb007=true
          for file_sshihabb007 in $files_sshihabb007; do
            filename_sshihabb007=$(basename "$file_sshihabb007")
            if [ "$filename_sshihabb007" = ".gitkeep" ]; then continue; fi
            if [ "$first_sshihabb007" = true ]; then
              first_sshihabb007=false
            else
              echo "," >> photos.json
            fi
            timestamp_sshihabb007=$(git log -1 --format=%ct "$file_sshihabb007")
            if [ -z "$timestamp_sshihabb007" ]; then timestamp_sshihabb007=$(date +%s); fi
            echo "  {\"url\": \"$file_sshihabb007\", \"thumb_url\": \"UPLOAD/thumbs/$filename_sshihabb007\", \"timestamp\": $timestamp_sshihabb007}" >> photos.json
          done
          echo "]" >> photos.json

      - name: Commit and Push
        run: |
          git config --global user.name "Gallery Bot"
          git config --global user.email "actions@github.com"
          git add photos.json UPLOAD/thumbs/
          git commit -m "Auto-update gallery and thumbnails" || exit 0
          git push
