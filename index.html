<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Smooth transitions for theme switching */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        
        /* Lightbox transitions */
        #lightbox { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #lightbox.active { opacity: 1; pointer-events: auto; }
        #lightboxImg { transition: transform 0.3s ease; cursor: zoom-in; }
        #lightboxImg.zoomed { transform: scale(2); cursor: zoom-out; }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md px-6 py-4 border-b border-zinc-200 dark:border-zinc-800">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-black tracking-widest uppercase">Media Line</h1>
            <div class="flex items-center gap-4 flex-wrap justify-center">
                
                <div class="flex items-center bg-zinc-100 dark:bg-zinc-900 rounded-full border border-zinc-200 dark:border-zinc-800 p-1">
                    <button class="px-3 py-1 rounded-full text-xs font-medium hover:bg-white dark:hover:bg-zinc-800 transition-colors" onclick="setGridSize_sshihabb007('small')">Grid S</button>
                    <button class="px-3 py-1 rounded-full text-xs font-medium hover:bg-white dark:hover:bg-zinc-800 transition-colors" onclick="setGridSize_sshihabb007('medium')">Grid M</button>
                    <button class="px-3 py-1 rounded-full text-xs font-medium hover:bg-white dark:hover:bg-zinc-800 transition-colors" onclick="setGridSize_sshihabb007('large')">Grid L</button>
                </div>
                
                <select id="sortFilter" class="bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-full px-4 py-2 text-sm font-medium outline-none">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="1week">Last 1 Week</option>
                    <option value="1month">Last 1 Month</option>
                    <option value="2months">Last 2 Months</option>
                    <option value="3months">Last 3 Months</option>
                </select>

                <button id="themeToggle" class="bg-zinc-100 dark:bg-zinc-900 px-4 py-2 rounded-full text-sm font-medium border border-zinc-200 dark:border-zinc-800 transition-all hover:scale-105">
                    <span class="dark:hidden">🌙</span>
                    <span class="hidden dark:inline">☀️</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="p-4 md:p-8">
        <div id="gallery" class="columns-2 sm:columns-3 md:columns-4 lg:columns-6 gap-2 space-y-2">
            <div id="loader" class="text-center py-20 opacity-50 w-full col-span-full">Scanning folder for new shots...</div>
        </div>
    </main>

    <!-- Lightbox Component -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur flex items-center justify-center p-4">
        <button id="closeLightbox" class="absolute top-6 right-6 text-white bg-white/10 hover:bg-white/20 rounded-full p-2 w-10 h-10 flex items-center justify-center backdrop-blur transition-all z-50">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="relative w-full h-full flex items-center justify-center overflow-auto">
            <img id="lightboxImg" src="" alt="High Resolution View" class="max-w-full max-h-[90vh] object-contain rounded shadow-2xl" />
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
