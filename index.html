<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Smooth transitions for theme switching */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        
        /* Lightbox transitions */
        #lightbox { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #lightbox.active { opacity: 1; pointer-events: auto; }
        #lightboxImg { transition: transform 0.3s ease; cursor: zoom-in; }
        #lightboxImg.zoomed { transform: scale(2); cursor: zoom-out; }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md px-3 py-3 sm:px-6 sm:py-4 border-b border-zinc-200 dark:border-zinc-800">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-4 w-full">
            <h1 class="text-lg sm:text-xl flex items-center font-black tracking-widest uppercase w-full justify-center sm:w-auto sm:justify-start">
                Media Line
                <span id="photoCount" class="text-xs sm:text-sm font-medium text-zinc-500 bg-zinc-100 dark:bg-zinc-900 px-2 py-0.5 sm:px-3 sm:py-1 rounded-full ml-2 hidden">0</span>
            </h1>
            <div class="flex items-center gap-1.5 sm:gap-4 flex-nowrap w-full justify-start sm:justify-end overflow-x-auto pb-1" style="scrollbar-width: none; -ms-overflow-style: none;">
                
                <div class="flex items-center gap-1 sm:gap-3 bg-zinc-100 dark:bg-zinc-900 rounded-full border border-zinc-200 dark:border-zinc-800 px-2 py-1 sm:px-4 sm:py-2">
                    <span class="text-[10px] sm:text-xs font-medium text-zinc-500 whitespace-nowrap">Grid <span id="colCountDisplay">6</span></span>
                    <input type="range" id="columnSlider_sshihabb007" min="1" max="10" value="6" class="w-16 sm:w-20 md:w-24 h-1 bg-zinc-300 dark:bg-zinc-700 rounded-lg appearance-none cursor-pointer">
                </div>
                
                <select id="sortFilter" class="bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-full px-2 py-1 sm:px-4 sm:py-2 text-[10px] sm:text-sm font-medium outline-none">
                    <option value="newest">Recently Added</option>
                    <option value="oldest">Oldest First</option>
                    <option value="today">Today (Last 24 Hrs)</option>
                    <option value="1week">Last 1 Week</option>
                    <option value="1month">Last 1 Month</option>
                    <option value="2months">Last 2 Months</option>
                    <option value="3months">Last 3 Months</option>
                </select>

                <div class="relative flex items-center">
                    <input type="date" id="dateFilter_sshihabb007" class="bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-full px-2 py-1 sm:px-3 sm:py-2 text-[10px] sm:text-sm font-medium outline-none cursor-pointer text-zinc-500 w-24 sm:w-auto">
                </div>

                <button id="themeToggle" class="bg-zinc-100 dark:bg-zinc-900 px-2 py-1 sm:px-4 sm:py-2 rounded-full text-xs sm:text-sm font-medium border border-zinc-200 dark:border-zinc-800 transition-all hover:scale-105 shrink-0">
                    <span class="dark:hidden">🌙</span>
                    <span class="hidden dark:inline">☀️</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="p-4 md:p-8">
        <div id="gallery" class="flex flex-col space-y-8">
            <div id="loader" class="text-center py-20 opacity-50 w-full">Scanning folder for new shots...</div>
        </div>
    </main>

    <!-- Lightbox Component -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur flex items-center justify-center p-4">
        <button id="closeLightbox" class="absolute top-4 right-4 sm:top-6 sm:right-6 text-white bg-white/10 hover:bg-white/20 rounded-full p-2 w-10 h-10 flex items-center justify-center backdrop-blur transition-all z-50">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        
        <button onclick="changePhoto_sshihabb007(-1, event)" class="absolute left-2 sm:left-6 top-1/2 transform -translate-y-1/2 text-white bg-white/10 hover:bg-white/20 rounded-full p-2 w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center backdrop-blur transition-all z-50">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        
        <button onclick="changePhoto_sshihabb007(1, event)" class="absolute right-2 sm:right-6 top-1/2 transform -translate-y-1/2 text-white bg-white/10 hover:bg-white/20 rounded-full p-2 w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center backdrop-blur transition-all z-50">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        <div class="relative w-full h-full flex items-center justify-center overflow-auto">
            <img id="lightboxImg" src="" alt="High Resolution View" class="max-w-full max-h-[90vh] object-contain rounded shadow-2xl" />
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
