<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Smooth transitions for theme switching */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800">
        <h1 class="text-xl font-black tracking-widest uppercase">Media Gallery</h1>
        <button id="themeToggle" class="bg-zinc-100 dark:bg-zinc-900 px-4 py-2 rounded-full text-sm font-medium border border-zinc-200 dark:border-zinc-800 transition-all hover:scale-105">
            <span class="dark:hidden">🌙 Dark Mode</span>
            <span class="hidden dark:inline">☀️ Light Mode</span>
        </button>
    </nav>

    <main class="p-4 md:p-8">
        <div id="gallery" class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-4 space-y-4">
            <div id="loader" class="text-center py-20 opacity-50">Scanning folder for new shots...</div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
